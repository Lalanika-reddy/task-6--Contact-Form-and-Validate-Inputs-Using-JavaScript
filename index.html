<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO & Meta Tags -->
  <title>Contact Us — Antigravity Workspace</title>
  <meta name="description" content="Get in touch with the Antigravity OS team. A secure, premium contact portal for spatial developer workspace inquiries.">
  <meta name="keywords" content="contact form, spatial computing, developer tools, form validation, javascript validation">
  <meta name="author" content="Antigravity Team">
  
  <!-- Favicon Mockup -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238b5cf6'/><path d='M30 65 L50 35 L70 65' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dynamic Background Orbs -->
  <div class="bg-glow orb-1" id="bg-orb-1"></div>
  <div class="bg-glow orb-2" id="bg-orb-2"></div>
  <div class="bg-grid"></div>

  <main class="main-container">
    <div class="form-card" id="form-card">
      
      <!-- Contact Form View -->
      <div class="form-view-container" id="form-view">
        <header class="form-header">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h1 class="form-title">Send a Message</h1>
          <p class="form-subtitle">Have questions? Reach out to the Antigravity team. We'll reply within a few hours.</p>
        </header>

        <form id="contact-form" novalidate>
          <!-- Name Field -->
          <div class="input-group" id="group-name">
            <div class="input-wrapper">
              <input type="text" id="name" class="form-input" autocomplete="name" required placeholder=" ">
              <label for="name" class="form-label">Full Name</label>
              <div class="input-focus-line"></div>
              <div class="input-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
            </div>
            <span class="error-message" id="error-name" aria-live="polite"></span>
          </div>

          <!-- Email Field -->
          <div class="input-group" id="group-email">
            <div class="input-wrapper">
              <input type="email" id="email" class="form-input" autocomplete="email" required placeholder=" ">
              <label for="email" class="form-label">Email Address</label>
              <div class="input-focus-line"></div>
              <div class="input-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </div>
            </div>
            <span class="error-message" id="error-email" aria-live="polite"></span>
          </div>

          <!-- Message Field -->
          <div class="input-group" id="group-message">
            <div class="input-wrapper">
              <textarea id="message" class="form-input form-textarea" required placeholder=" " rows="4"></textarea>
              <label for="message" class="form-label">Message</label>
              <div class="input-focus-line"></div>
              <div class="input-icon textarea-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
              </div>
            </div>
            <span class="error-message" id="error-message" aria-live="polite"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="btn-text">Send Message</span>
            <span class="btn-loader hidden">
              <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
              </svg>
            </span>
            <svg class="btn-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>
      </div>

      <!-- Success View -->
      <div class="success-view-container hidden" id="success-view">
        <div class="success-icon-wrap">
          <svg class="checkmark-svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
          </svg>
        </div>
        <h2 class="success-title">Message Sent!</h2>
        <p class="success-message">Thank you for reaching out, <span id="user-display-name" class="highlight-text">Developer</span>. Your inquiry has been received. Our co-pilot is processing your request, and we will get back to you shortly.</p>
        <button class="reset-btn" id="new-message-btn">
          <span>Send Another Message</span>
        </button>
      </div>

    </div>
  </main>

  <!-- Script File -->
  <script src="app.js"></script>
</body>
</html>
